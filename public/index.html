<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Services AI Assistant
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="container">

    <h1>
      Services AI Assistant
    </h1>

    <select id="serviceDropdown">

      <option value="">
        Select a Government Service
      </option>

    </select>

    <textarea
      id="message"
      readonly
      placeholder="Select a service first..."
    ></textarea>

    <button
      id="askBtn"
      onclick="sendMessage()"
      disabled
    >
      Ask
    </button>

    <div id="response"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script src="app.js"></script>

</body>

</html>
